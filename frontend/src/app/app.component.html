<div class="flex flex-col h-screen bg-gray-50 text-gray-800 font-sans">
  
  <header class="bg-white shadow-sm py-4 px-6 flex items-center justify-between z-10">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">C</div>
      <h1 class="text-xl font-bold text-gray-800">Clariva</h1>
    </div>
    <span class="text-sm text-gray-500">AI Study Assistant</span>
  </header>

  <main class="flex-1 overflow-y-auto p-4 md:p-6" #scrollMe>
    <div class="max-w-3xl mx-auto space-y-6">
      
      <div *ngIf="(messages$ | async)?.length === 0" class="text-center mt-20">
        <h2 class="text-2xl font-semibold text-gray-700 mb-2">How can I help you study today?</h2>
        <p class="text-gray-500">Ask me anything about Spring Boot, JWT, Angular, or your homework.</p>
      </div>

      <ng-container *ngFor="let msg of messages$ | async">
        <div class="flex w-full" [ngClass]="{'justify-end': msg.role === 'user', 'justify-start': msg.role === 'ai'}">
          <div class="max-w-[80%] rounded-2xl px-5 py-3 shadow-sm"
               [ngClass]="{
                 'bg-blue-600 text-white': msg.role === 'user',
                 'bg-white border border-gray-200 text-gray-800': msg.role === 'ai'
               }">
            <p class="whitespace-pre-wrap leading-relaxed">{{ msg.content }}</p>
          </div>
        </div>
      </ng-container>

      <div *ngIf="isLoading" class="flex w-full justify-start">
        <div class="bg-white border border-gray-200 rounded-2xl px-5 py-3 shadow-sm flex items-center gap-2">
          <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
          <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s;"></div>
          <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.4s;"></div>
        </div>
      </div>

    </div>
  </main>

  <footer class="bg-white border-t border-gray-200 p-4">
    <div class="max-w-3xl mx-auto relative">
      <form (ngSubmit)="onSubmit()" class="flex items-center bg-gray-100 rounded-xl overflow-hidden focus-within:ring-2 focus-within:ring-blue-500 focus-within:bg-white transition-all">
        <input 
          type="text" 
          name="userInput"
          [(ngModel)]="userInput"
          [disabled]="isLoading"
          placeholder="Ask Clariva something..." 
          class="flex-1 bg-transparent py-4 px-5 outline-none disabled:opacity-50"
          autocomplete="off"
        >
        <button 
          type="submit" 
          [disabled]="!userInput.trim() || isLoading"
          class="p-2 mr-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50 disabled:hover:bg-blue-600 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
          </svg>
        </button>
      </form>
      <div class="text-center mt-2 text-xs text-gray-400">
        Clariva can make mistakes. Consider verifying important information.
      </div>
    </div>
  </footer>
</div>
