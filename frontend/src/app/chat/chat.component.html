<div class="flex flex-col h-screen bg-gray-50">
  
  <!-- Top Navigation Bar -->
  <header class="flex items-center justify-between px-6 py-4 text-white bg-blue-600 shadow-md">
    <h1 class="text-xl font-bold">{{ title }}</h1>
    <button (click)="logout()" class="px-4 py-2 text-sm text-blue-600 bg-white rounded-md">Logout</button>
  </header>

  <!-- Main Chat Message Container. Linked to @ViewChild('scrollMe') -->
  <main #scrollMe class="flex-1 p-6 overflow-y-auto">
    <div class="space-y-4">
      
      <!-- Loops through the messages array. Uses ngClass to conditionally align/color bubbles based on role -->
      <div *ngFor="let msg of messages" 
           [ngClass]="{'ml-auto bg-blue-100': msg.role === 'user', 'bg-white': msg.role === 'ai'}"
           class="p-4 rounded-lg shadow w-fit max-w-[80%]">
        
        <!-- [innerHTML] tells Angular to render the text as actual HTML tags (for our markdown parser) -->
        <div [innerHTML]="msg.content" class="text-gray-800"></div>
      </div>
      
      <!-- Typing Indicator, only visible when waiting for backend response -->
      <div *ngIf="isLoading" class="p-4 bg-white rounded-lg shadow w-fit">
        <p class="text-gray-500 italic">StudyMate is typing...</p>
      </div>
    </div>
  </main>

  <!-- Bottom Input Bar -->
  <footer class="p-4 bg-white border-t">
    <form (ngSubmit)="onSubmit()" class="flex space-x-2 text-black">
      <input type="text" [(ngModel)]="userInput" name="userInput" placeholder="Type your message..." class="flex-1 px-4 py-2 border rounded-full" autocomplete="off" [disabled]="isLoading" />
      <button type="submit" [disabled]="isLoading" class="px-6 py-2 text-white bg-blue-600 rounded-full disabled:bg-blue-300">Send</button>
    </form>
  </footer>
</div>
