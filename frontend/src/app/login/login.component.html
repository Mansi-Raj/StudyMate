<div class="flex items-center justify-center min-h-screen bg-gray-100">
  <div class="w-full max-w-md p-8 bg-white rounded-lg shadow-md">
    <h2 class="mb-6 text-2xl font-bold text-center text-gray-800">StudyMate Login</h2>
    
    <form (ngSubmit)="onLogin()" class="space-y-4">
      <div>
        <label class="block mb-1 text-sm font-medium text-gray-600">Username</label>
        <input 
          type="text" 
          [(ngModel)]="username" 
          name="username" 
          class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          required 
        />
      </div>
      
      <div>
        <label class="block mb-1 text-sm font-medium text-gray-600">Password</label>
        <input 
          type="password" 
          [(ngModel)]="password" 
          name="password" 
          class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          required 
        />
      </div>
      
      <button 
        type="submit" 
        class="w-full px-4 py-2 text-white bg-blue-600 rounded-md hover:bg-blue-700">
        Sign In
      </button>
    </form>
  </div>
</div>
