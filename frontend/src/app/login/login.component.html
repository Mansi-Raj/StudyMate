<div class="flex items-center justify-center min-h-screen bg-gray-100">
  <div class="w-full max-w-md p-8 bg-white rounded-lg shadow-md">
    
    <!-- Dynamic Header depending on state -->
    <h2 class="mb-6 text-2xl font-bold text-center text-gray-800">
      {{ isRegistering ? 'Register for StudyMate' : 'StudyMate Login' }}
    </h2>
    
    <!-- Form binds to onSubmit() function -->
    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="block mb-1 text-sm font-medium text-gray-600">Username</label>
        <!-- Two-way binding with [(ngModel)] links the input directly to the TypeScript variables -->
        <input type="text" [(ngModel)]="username" name="username" class="w-full px-4 py-2 border rounded-md" required />
      </div>
      <div>
        <label class="block mb-1 text-sm font-medium text-gray-600">Password</label>
        <input type="password" [(ngModel)]="password" name="password" class="w-full px-4 py-2 border rounded-md" required />
      </div>
      
      <!-- Dynamic Button Text -->
      <button type="submit" class="w-full px-4 py-2 text-white bg-blue-600 rounded-md">
        {{ isRegistering ? 'Sign Up' : 'Sign In' }}
      </button>
    </form>

    <!-- Toggle Button to switch between forms -->
    <div class="mt-4 text-center">
      <button (click)="isRegistering = !isRegistering" class="text-sm text-blue-600 hover:underline">
        {{ isRegistering ? 'Already have an account? Log in' : 'Need an account? Register' }}
      </button>
    </div>
  </div>
</div>
